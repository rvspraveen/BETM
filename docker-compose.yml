version: '3.9'

services:

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: ercot_db
    env_file:
      - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-copilot} -d $${POSTGRES_DB:-ercot_copilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + cache) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ercot_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ercot_backend
    env_file:
      - backend/.env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./docs_src:/app/docs_src
    command: >
      sh -c "
        echo 'Waiting for DB...' &&
        sleep 5 &&
        echo 'Running seeder...' &&
        cd /app && python /app/data/seed.py || true &&
        echo 'Embedding documents...' &&
        cd /app && python /app/data/embed_documents.py || true &&
        echo 'Starting API...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ── Celery Worker (background tasks) ────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ercot_worker
    env_file:
      - backend/.env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./docs_src:/app/docs_src
    command: celery -A app.worker worker --loglevel=info --concurrency=2

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: ercot_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: http://backend:8000/api/v1
      VITE_MOCK_MODE: "false"

volumes:
  pgdata:
